  <script>
    const DRAW_MS = 800;
    const FILL_MS = 300;
    const PAUSE_MS = 300;
    const FADE_MS = 300;
    const FILL_COLOR = '#32CD32';

    const paths = Array.from(document.querySelectorAll('#lemon path'));

    // Phase 0: prep every path as an undrawn stroke outline.
    for (const p of paths) {
      const len = p.getTotalLength();
      p.style.fill = FILL_COLOR;
      p.style.fillOpacity = '0';
      p.style.stroke = FILL_COLOR;
      p.style.strokeOpacity = '1';
      p.style.strokeWidth = '6';
      p.style.strokeLinecap = 'round';
      p.style.strokeLinejoin = 'round';
      p.style.strokeDasharray = String(len);
      p.style.strokeDashoffset = String(len);
    }

    // Wait a frame so the initial (undrawn) state actually paints before the
    // transition is enabled, otherwise the browser can collapse the two states.
    requestAnimationFrame(() => requestAnimationFrame(() => {
      for (const p of paths) {
        p.style.transition = `stroke-dashoffset ${DRAW_MS}ms ease`;
        p.style.strokeDashoffset = '0';
      }
    }));

    setTimeout(() => {
      for (const p of paths) {
        p.style.transition = `fill-opacity ${FILL_MS}ms ease, stroke-opacity ${FILL_MS}ms ease`;
        p.style.fillOpacity = '1';
        p.style.strokeOpacity = '0';
      }
    }, DRAW_MS);

    setTimeout(() => {
      document.getElementById('splash').style.opacity = '0';
    }, DRAW_MS + FILL_MS + PAUSE_MS);

    setTimeout(() => {
      window.splash.done();
    }, DRAW_MS + FILL_MS + PAUSE_MS + FADE_MS);
  </script>
