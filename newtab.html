<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>New Tab</title>
<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --nt-bg: #1a1a1a;
    --nt-fg: #e0e0e0;
    --nt-fg-mid: #b0b0b0;
    --nt-fg-muted: #808080;
    --nt-panel-bg: #252525;
    --nt-border: #2d2d2d;
  }

  :root.light-theme {
    --nt-bg: #f5f5f5;
    --nt-fg: #1a1a1a;
    --nt-fg-mid: #444444;
    --nt-fg-muted: #777777;
    --nt-panel-bg: #ffffff;
    --nt-border: #d6d6d6;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--nt-bg);
    color: var(--nt-fg);
    font-family: 'Segoe UI', Arial, sans-serif;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }

  #logo {
    width: 140px;
    height: auto;
  }

  form {
    width: 100%;
    max-width: 480px;
    padding: 0 20px;
  }

  input[type="text"] {
    width: 100%;
    height: 44px;
    border: 1px solid var(--nt-border);
    background: var(--nt-panel-bg);
    color: var(--nt-fg);
    padding: 0 20px;
    font-size: 15px;
    outline: none;
  }

  input[type="text"]:focus {
    border-color: #32CD32;
  }

  .shortcuts {
    display: flex;
    gap: 24px;
  }

  .shortcut {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 88px;
    text-decoration: none;
    color: var(--nt-fg-mid);
  }

  .shortcut:hover {
    color: #32CD32;
  }

  .shortcut-icon {
    width: 48px;
    height: 48px;
    background: var(--nt-panel-bg);
    border: 1px solid var(--nt-border);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .shortcut:hover .shortcut-icon {
    border-color: #32CD32;
    box-shadow: 0 0 8px rgba(50, 205, 50, 0.3);
  }

  .shortcut-icon img {
    width: 28px;
    height: 28px;
  }

  .shortcut span {
    font-size: 12px;
  }

  .clock {
    position: fixed;
    bottom: 32px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 2px;
    color: var(--nt-fg-muted);
  }
</style>
</head>
<body>
  <img id="logo" src="assets/lymologo.svg" alt="Lymo" />

  <form action="https://www.google.com/search" method="GET">
    <input type="text" name="q" placeholder="Search Google" autofocus />
  </form>

  <div class="shortcuts">
    <a class="shortcut" href="https://www.youtube.com">
      <span class="shortcut-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=youtube.com" alt="" /></span>
      <span>YouTube</span>
    </a>
    <a class="shortcut" href="https://www.reddit.com">
      <span class="shortcut-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=reddit.com" alt="" /></span>
      <span>Reddit</span>
    </a>
    <a class="shortcut" href="https://www.github.com">
      <span class="shortcut-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=github.com" alt="" /></span>
      <span>GitHub</span>
    </a>
    <a class="shortcut" href="https://www.instagram.com">
      <span class="shortcut-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=instagram.com" alt="" /></span>
      <span>Instagram</span>
    </a>
  </div>

  <div class="clock" id="clock"></div>

  <script>
    function updateClock() {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      document.getElementById('clock').textContent =
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // No preload on tab views, so the app theme is pushed in from main.js
    // via executeJavaScript on every navigation; this is a no-op on any
    // other page since window.__lymoSetTheme only exists here.
    window.__lymoSetTheme = function (dark) {
      document.documentElement.classList.toggle('light-theme', !dark);
    };
  </script>
</body>
</html>
