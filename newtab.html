<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>New Tab</title>
<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --nt-bg: #1a1a1a;
    --nt-fg: #e0e0e0;
    --nt-fg-mid: #b0b0b0;
    --nt-fg-muted: #808080;
    --nt-panel-bg: #252525;
    --nt-border: #2d2d2d;
    --nt-accent: #32CD32;
  }

  :root.light-theme {
    --nt-bg: #f5f5f5;
    --nt-fg: #1a1a1a;
    --nt-fg-mid: #444444;
    --nt-fg-muted: #777777;
    --nt-panel-bg: #ffffff;
    --nt-border: #d6d6d6;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--nt-bg);
    color: var(--nt-fg);
    font-family: 'Segoe UI', Arial, sans-serif;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }

  #logo {
    width: 140px;
    height: auto;
  }

  form {
    width: 100%;
    max-width: 480px;
    padding: 0 20px;
  }

  input[type="text"] {
    width: 100%;
    height: 44px;
    border: 1px solid var(--nt-border);
    background: var(--nt-panel-bg);
    color: var(--nt-fg);
    padding: 0 20px;
    font-size: 15px;
    outline: none;
  }

  input[type="text"]:focus {
    border-color: var(--nt-accent);
  }

  .shortcuts {
    display: flex;
    gap: 24px;
  }

  .shortcut {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 88px;
    text-decoration: none;
    color: var(--nt-fg-mid);
  }

  .shortcut:hover {
    color: var(--nt-accent);
  }

  .shortcut-icon {
    width: 48px;
    height: 48px;
    background: var(--nt-panel-bg);
    border: 1px solid var(--nt-border);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .shortcut:hover .shortcut-icon {
    border-color: var(--nt-accent);
    box-shadow: 0 0 8px color-mix(in srgb, var(--nt-accent) 30%, transparent);
  }

  .shortcut-icon img {
    width: 28px;
    height: 28px;
  }

  .shortcut span {
    font-size: 12px;
  }

  .bookmarks {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 640px;
    padding: 0 20px;
  }

  .bookmarks:empty {
    display: none;
  }

  .bookmark-folder-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--nt-fg-muted);
    margin-bottom: 8px;
  }

  .bookmark-folder-items {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .bookmark-link {
    display: flex;
    align-items: center;
    gap: 8px;
    max-width: 200px;
    padding: 6px 12px;
    background: var(--nt-panel-bg);
    border: 1px solid var(--nt-border);
    color: var(--nt-fg-mid);
    text-decoration: none;
    font-size: 12px;
  }

  .bookmark-link:hover {
    border-color: var(--nt-accent);
    color: var(--nt-accent);
  }

  .bookmark-link img {
    flex: 0 0 auto;
    width: 14px;
    height: 14px;
    object-fit: contain;
  }

  .bookmark-link span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .clock {
    position: fixed;
    bottom: 32px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 2px;
    color: var(--nt-fg-muted);
  }
</style>
</head>
<body>
  <img id="logo" src="assets/lymologo.svg" alt="Lymo" />

  <form action="https://www.google.com/search" method="GET">
    <input type="text" name="q" placeholder="Search Google" autofocus />
  </form>

  <div class="shortcuts" id="shortcuts-container"></div>

  <div class="bookmarks" id="bookmarks-container"></div>

  <div class="clock" id="clock"></div>

  <script>
    function updateClock() {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      document.getElementById('clock').textContent =
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // No preload on tab views, so the app theme is pushed in from main.js
    // via executeJavaScript on every navigation; this is a no-op on any
    // other page since window.__lymoSetTheme only exists here.
    window.__lymoSetTheme = function (dark) {
      document.documentElement.classList.toggle('light-theme', !dark);
    };
    window.__lymoSetAccent = function (color) {
      document.documentElement.style.setProperty('--nt-accent', color);
    };

    // Shortcuts are managed entirely from the Settings page; this page only
    // renders whatever list main.js pushes in (see window.__lymoSetShortcuts
    // below), starting from this same default set so the first paint isn't
    // empty while waiting for the real (possibly customized) list to arrive.
    const DEFAULT_SHORTCUTS = [
      { name: 'YouTube', url: 'https://www.youtube.com' },
      { name: 'Reddit', url: 'https://www.reddit.com' },
      { name: 'GitHub', url: 'https://www.github.com' },
      { name: 'Kick', url: 'https://kick.com' }
    ];

    function faviconUrl(url) {
      try {
        const hostname = new URL(url).hostname;
        return `https://www.google.com/s2/favicons?sz=64&domain=${hostname}`;
      } catch {
        return '';
      }
    }

    function renderShortcuts(list) {
      const container = document.getElementById('shortcuts-container');
      container.innerHTML = '';
      for (const s of list) {
        const a = document.createElement('a');
        a.className = 'shortcut';
        a.href = s.url;
        const icon = document.createElement('span');
        icon.className = 'shortcut-icon';
        const img = document.createElement('img');
        img.src = faviconUrl(s.url);
        img.alt = '';
        icon.appendChild(img);
        const label = document.createElement('span');
        label.textContent = s.name;
        a.appendChild(icon);
        a.appendChild(label);
        container.appendChild(a);
      }
    }

    renderShortcuts(DEFAULT_SHORTCUTS);
    window.__lymoSetShortcuts = renderShortcuts;

    // Bookmarks are managed entirely from the Settings page and the toolbar
    // star button; this page only renders whatever main.js pushes in.
    function renderBookmarks({ folders, bookmarks }) {
      const container = document.getElementById('bookmarks-container');
      container.innerHTML = '';
      for (const folder of folders) {
        const items = bookmarks.filter((b) => b.folderId === folder.id);
        if (items.length === 0) continue;

        const section = document.createElement('div');
        const title = document.createElement('div');
        title.className = 'bookmark-folder-title';
        title.textContent = folder.name;
        const itemsEl = document.createElement('div');
        itemsEl.className = 'bookmark-folder-items';
        for (const b of items) {
          const a = document.createElement('a');
          a.className = 'bookmark-link';
          a.href = b.url;
          a.title = b.url;
          const img = document.createElement('img');
          img.src = faviconUrl(b.url);
          img.alt = '';
          const label = document.createElement('span');
          label.textContent = b.name;
          a.appendChild(img);
          a.appendChild(label);
          itemsEl.appendChild(a);
        }
        section.appendChild(title);
        section.appendChild(itemsEl);
        container.appendChild(section);
      }
    }

    window.__lymoSetBookmarks = renderBookmarks;
  </script>
</body>
</html>
