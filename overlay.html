<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lymo Overlay</title>
<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --ov-bg: #1a1a1a;
    --ov-fg: #e0e0e0;
    --ov-fg-strong: #ffffff;
    --ov-fg-mid: #b0b0b0;
    --ov-fg-muted: #808080;
    --ov-border: #2d2d2d;
    --ov-popup-bg: rgba(37, 37, 37, 0.95);
    --ov-tab-hover-bg: rgba(37, 37, 37, 0.9);
    --ov-tab-active-bg: rgba(45, 45, 45, 0.95);
    --ov-accent: #32CD32;
    --ov-incognito-bg: rgba(120, 90, 200, 0.18);
    --ov-incognito-bg-hover: rgba(120, 90, 200, 0.28);
  }

  :root.light-theme {
    --ov-bg: #ffffff;
    --ov-fg: #1a1a1a;
    --ov-fg-strong: #000000;
    --ov-fg-mid: #444444;
    --ov-fg-muted: #777777;
    --ov-border: #d6d6d6;
    --ov-popup-bg: rgba(255, 255, 255, 0.97);
    --ov-tab-hover-bg: rgba(0, 0, 0, 0.05);
    --ov-tab-active-bg: rgba(0, 0, 0, 0.08);
    --ov-incognito-bg: rgba(120, 90, 200, 0.12);
    --ov-incognito-bg-hover: rgba(120, 90, 200, 0.2);
  }

  /* --- UI style (shape) variables: kept in sync with the matching block in
     styles.css and settings.html (no shared-include mechanism here). ---
     Style 1 (classic, default): sharp corners, outline/tint buttons. */
  :root {
    --ui-radius-sm: 0px;
    --ui-radius-md: 0px;
    --ui-radius-pill: 0px;
    --ui-btn-fill: transparent;
    --ui-btn-fill-hover: color-mix(in srgb, var(--ov-fg) 12%, transparent);
  }

  :root[data-style="2"] {
    --ui-radius-sm: 8px;
    --ui-radius-md: 12px;
    --ui-radius-pill: 999px;
    --ui-btn-fill: color-mix(in srgb, var(--ov-fg) 8%, transparent);
    --ui-btn-fill-hover: var(--ov-accent);
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: transparent;
    color: var(--ov-fg);
    font-family: 'Segoe UI', Arial, sans-serif;
    user-select: none;
    overflow: hidden;
  }

  /* --- Sliding vertical tab panel --- */

  #sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 200px;
    /* Ambient mode: tinted to match the active page's top color, same as
       the toolbar (see renderer.js's onChromeColor); falls back to the
       original neutral dark tone until a color has been sampled. */
    background: var(--sidebar-bg, var(--ov-bg));
    color: var(--sidebar-fg, var(--ov-fg));
    border-right: 1px solid var(--ov-accent);
    display: none;
    flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.3s ease, background 0.2s ease, color 0.2s ease;
  }

  #sidebar.visible {
    display: flex;
  }

  #sidebar.open {
    transform: translateX(0);
  }

  /* --- LymoChat slide-in panel (right edge, full height) --- */

  #lymochat-panel {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 380px;
    background: transparent;
    display: none;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s ease;
  }

  #lymochat-panel.visible {
    display: flex;
  }

  #lymochat-panel.open {
    transform: translateX(0);
  }

  #lymochat-panel.resizing {
    transition: none;
  }

  #lymochat-resize-handle {
    /* Kept fully inside the panel (never past its left edge) so the whole
       hit area stays within the overlay BrowserView's clipped bounds and
       is always reachable, even before a drag expands that view. The whole
       left wall of the panel is grabbable, not just a thin sliver. */
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    cursor: ew-resize;
    background: var(--sidebar-bg, var(--ov-bg));
    border-left: 1px solid var(--ov-accent);
    z-index: 2;
    transition: background 0.2s ease;
  }

  #lymochat-resize-handle:hover,
  #lymochat-panel.resizing #lymochat-resize-handle {
    border-left-color: var(--ov-accent);
  }

  #lymochat-header {
    height: 32px;
    min-height: 32px;
    line-height: 32px;
    padding: 0 12px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--ov-accent);
    background: var(--sidebar-bg, var(--ov-bg));
    border-bottom: 1px solid var(--ov-accent);
    border-left: 1px solid var(--ov-accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.2s ease;
  }

  #lymochat-close-btn {
    background: transparent;
    border: none;
    color: var(--ov-fg);
    font-size: 16px;
    cursor: pointer;
    line-height: 1;
    padding: 4px 6px;
  }

  #lymochat-close-btn:hover {
    color: var(--ov-accent);
  }

  #sidebar-title {
    height: 40px;
    line-height: 40px;
    padding: 0 14px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--ov-accent);
    border-bottom: 1px solid var(--ov-border);
  }

  #sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  #tabs-wrapper {
    position: relative;
  }

  #tabs {
    display: flex;
    flex-direction: column;
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 36px;
    padding: 0 10px;
    border-left: 3px solid transparent;
    border-radius: var(--ui-radius-sm);
    color: var(--ov-fg-mid);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
  }

  /* Open animation: slide down + fade in + slight scale-up, spring easing. */
  .tab.tab-enter {
    height: 0;
    opacity: 0;
    transform: scale(0.9) translateY(-6px);
  }

  .tab.tab-enter-active {
    height: 36px;
    opacity: 1;
    transform: scale(1) translateY(0);
    transition: height 250ms cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 250ms cubic-bezier(0.34, 1.56, 0.64, 1),
                transform 250ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Close animation: shrink height + fade out + slide left; siblings below
     ride the height transition (flexbox reflows live) to slide up and fill
     the gap instead of jumping instantly. */
  .tab.tab-exit {
    transition: height 200ms ease, opacity 200ms ease, transform 200ms ease,
                border-left-width 200ms ease;
  }

  .tab.tab-exit-active {
    height: 0;
    opacity: 0;
    transform: translateX(-10px);
    border-left-width: 0;
  }

  .tab:hover {
    background: var(--ov-tab-hover-bg);
    color: var(--ov-fg-strong);
  }

  .tab.active {
    background: var(--ov-tab-active-bg);
    border-left-color: var(--ov-accent);
    color: var(--ov-fg-strong);
  }

  :root[data-style="2"] .tab.active {
    background: var(--ov-accent);
    border-left-color: transparent;
    color: #fff;
  }

  .tab-favicon {
    flex: 0 0 auto;
    width: 16px;
    height: 16px;
    object-fit: contain;
  }

  .tab-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .tab-close {
    color: var(--ov-fg-muted);
    font-size: 13px;
    line-height: 1;
    padding: 2px 4px;
  }

  .tab-close:hover {
    background: var(--ov-bg);
    color: var(--ov-accent);
  }

  /* Pinned tabs shrink to icon-only (no title, no close button) and always
     sort above unpinned tabs -- see normalizeTabOrder() in main.js. */
  .tab.pinned {
    justify-content: center;
    padding: 0;
  }

  .tab.dragging {
    opacity: 0.4;
  }

  /* Incognito tabs get a distinct tint so they're visually distinguishable
     from normal tabs in the list at a glance. */
  .tab.incognito {
    background: var(--ov-incognito-bg);
  }

  .tab.incognito:hover {
    background: var(--ov-incognito-bg-hover);
  }

  .tab-incognito-badge {
    flex: 0 0 auto;
    font-size: 11px;
    line-height: 1;
  }

  .tab-audio-btn {
    flex: 0 0 auto;
    background: transparent;
    border: none;
    color: var(--ov-fg-muted);
    font-size: 12px;
    line-height: 1;
    padding: 2px;
    cursor: pointer;
  }

  .tab-audio-btn:hover {
    color: var(--ov-accent);
  }

  /* Thin lime line marking the drop position while dragging a tab. */
  #tab-drop-indicator {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--ov-accent);
    box-shadow: 0 0 4px var(--ov-accent);
    pointer-events: none;
    display: none;
    z-index: 5;
  }

  #tab-drop-indicator.visible {
    display: block;
  }

  #new-tab-btn {
    height: 40px;
    border: none;
    border-top: 1px solid var(--ov-border);
    background: transparent;
    color: var(--ov-fg-mid);
    font-size: 13px;
    cursor: pointer;
  }

  #new-tab-btn:hover {
    background: var(--ov-tab-hover-bg);
    color: var(--ov-accent);
    box-shadow: inset 0 0 8px color-mix(in srgb, var(--ov-accent) 25%, transparent);
  }

  /* --- Sidebar bookmarks tree (below the open tabs) --- */

  #sidebar-bookmarks {
    border-top: 1px solid var(--ov-border);
    padding: 8px 0;
  }

  #sidebar-bookmarks-title {
    padding: 4px 14px 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--ov-fg-muted);
  }

  .bm-folder-header {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 28px;
    padding: 0 10px;
    color: var(--ov-fg-mid);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }

  .bm-folder-header:hover {
    background: var(--ov-tab-hover-bg);
    color: var(--ov-fg-strong);
  }

  .bm-folder-caret {
    flex: 0 0 auto;
    font-size: 9px;
    transition: transform 0.15s ease;
  }

  .bm-folder.collapsed .bm-folder-caret {
    transform: rotate(-90deg);
  }

  .bm-folder-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bm-folder-items {
    display: flex;
    flex-direction: column;
  }

  .bm-folder.collapsed .bm-folder-items {
    display: none;
  }

  .bm-item {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 28px;
    padding: 0 10px 0 26px;
    color: var(--ov-fg-mid);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }

  .bm-item:hover {
    background: var(--ov-tab-hover-bg);
    color: var(--ov-fg-strong);
  }

  .bm-item-favicon {
    flex: 0 0 auto;
    width: 14px;
    height: 14px;
    object-fit: contain;
  }

  .bm-item-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #sidebar-bookmarks-empty {
    padding: 6px 14px;
    color: var(--ov-fg-muted);
    font-size: 11px;
  }

  /* --- Bookmark folder-picker popup (shown from the toolbar star button) --- */

  #bookmark-picker-pop {
    position: fixed;
    right: 0;
    top: 0;
    width: 280px;
    height: 360px;
    background: var(--ov-popup-bg);
    border: 1px solid var(--ov-accent);
    border-right: none;
    border-radius: var(--ui-radius-md) 0 0 var(--ui-radius-md);
    box-shadow: 0 0 16px color-mix(in srgb, var(--ov-accent) 25%, transparent);
    display: none;
    flex-direction: column;
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  #bookmark-picker-pop.visible {
    display: flex;
  }

  #bookmark-picker-pop.open {
    opacity: 1;
    transform: translateY(0);
  }

  #bookmark-picker-title {
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ov-accent);
    border-bottom: 1px solid var(--ov-border);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #bookmark-picker-folders {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .bm-picker-folder {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 32px;
    padding: 0 12px;
    color: var(--ov-fg-mid);
    font-size: 12px;
    cursor: pointer;
  }

  .bm-picker-folder:hover {
    background: var(--ov-tab-hover-bg);
    color: var(--ov-fg-strong);
  }

  .bm-picker-folder.selected {
    background: var(--ov-tab-active-bg);
    color: var(--ov-accent);
  }

  #bookmark-picker-new-folder {
    display: flex;
    gap: 6px;
    padding: 8px 12px;
    border-top: 1px solid var(--ov-border);
  }

  #bookmark-picker-new-folder-input {
    flex: 1;
    min-width: 0;
    background: var(--ov-bg);
    color: var(--ov-fg);
    border: 1px solid var(--ov-border);
    padding: 4px 8px;
    font-size: 12px;
    outline: none;
  }

  #bookmark-picker-new-folder-input:focus {
    border-color: var(--ov-accent);
  }

  #bookmark-picker-actions {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    border-top: 1px solid var(--ov-border);
  }

  #bookmark-picker-actions .btn {
    flex: 1;
  }

  /* --- Find-in-page bar (Ctrl+F) --- */

  #find-bar-pop {
    position: fixed;
    right: 0;
    top: 0;
    width: 320px;
    height: 44px;
    background: var(--ov-popup-bg);
    border: 1px solid var(--ov-accent);
    border-right: none;
    border-radius: var(--ui-radius-md) 0 0 var(--ui-radius-md);
    box-shadow: 0 0 16px color-mix(in srgb, var(--ov-accent) 25%, transparent);
    display: none;
    align-items: center;
    gap: 6px;
    padding: 0 10px;
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  #find-bar-pop.visible {
    display: flex;
  }

  #find-bar-pop.open {
    opacity: 1;
    transform: translateY(0);
  }

  #find-input {
    flex: 1;
    min-width: 0;
    background: var(--ov-bg);
    color: var(--ov-fg);
    border: 1px solid var(--ov-border);
    border-radius: var(--ui-radius-sm);
    padding: 5px 8px;
    font-size: 12px;
    outline: none;
  }

  #find-input:focus {
    border-color: var(--ov-accent);
  }

  #find-count {
    flex: 0 0 auto;
    color: var(--ov-fg-muted);
    font-size: 11px;
    white-space: nowrap;
    min-width: 32px;
    text-align: center;
  }

  #find-bar-pop .btn {
    flex: 0 0 auto;
    padding: 3px 7px;
  }

  /* --- Address bar autocomplete dropdown (Ctrl+... typing in the address bar) ---
     Unlike the other popups, this one's BrowserView bounds are set to exactly
     match the desired on-screen rect (see getAutocompleteBounds() in main.js),
     so the popup itself just fills the whole view instead of self-anchoring
     to a corner. */

  #autocomplete-pop {
    position: fixed;
    inset: 0;
    background: var(--ov-popup-bg);
    border: 1px solid var(--ov-accent);
    border-top: none;
    border-radius: 0 0 var(--ui-radius-md) var(--ui-radius-md);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
    display: none;
    flex-direction: column;
    overflow-y: auto;
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  #autocomplete-pop.visible {
    display: flex;
  }

  #autocomplete-pop.open {
    opacity: 1;
  }

  .ac-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    cursor: pointer;
  }

  .ac-item:hover,
  .ac-item.highlighted {
    background: var(--ov-tab-hover-bg);
  }

  .ac-favicon {
    flex: 0 0 auto;
    width: 16px;
    height: 16px;
    object-fit: contain;
  }

  .ac-text {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  .ac-title {
    font-size: 12px;
    color: var(--ov-fg-strong);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .ac-url {
    font-size: 11px;
    color: var(--ov-fg-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .btn {
    border: 1px solid var(--ov-border);
    border-radius: var(--ui-radius-sm);
    background: var(--ov-bg);
    color: var(--ov-fg-mid);
    font-size: 11px;
    padding: 3px 8px;
    cursor: pointer;
    white-space: nowrap;
  }

  .btn:hover {
    border-color: var(--ov-accent);
    color: var(--ov-accent);
    box-shadow: 0 0 6px color-mix(in srgb, var(--ov-accent) 35%, transparent);
  }

  :root[data-style="2"] .btn {
    background: var(--ui-btn-fill);
    border: none;
  }

  :root[data-style="2"] .btn:hover {
    background: var(--ov-accent);
    color: #fff;
    box-shadow: none;
  }

  /* --- Downloads popup --- */

  #downloads-pop {
    position: fixed;
    right: 0;
    top: 0;
    width: 340px;
    height: 320px;
    background: var(--ov-popup-bg);
    border: 1px solid var(--ov-accent);
    border-right: none;
    border-radius: var(--ui-radius-md) 0 0 var(--ui-radius-md);
    box-shadow: 0 0 16px color-mix(in srgb, var(--ov-accent) 25%, transparent);
    display: none;
    flex-direction: column;
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  #downloads-pop.visible {
    display: flex;
  }

  #downloads-pop.open {
    opacity: 1;
    transform: translateY(0);
  }

  #downloads-title {
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ov-accent);
    border-bottom: 1px solid var(--ov-border);
  }

  #downloads-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px 12px;
  }

  #downloads-empty {
    color: var(--ov-fg-muted);
    font-size: 12px;
    text-align: center;
    padding: 20px 0;
  }

  .dl {
    background: var(--ov-bg);
    border: 1px solid var(--ov-border);
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 12px;
  }

  .dl.done {
    border-color: var(--ov-accent);
  }

  .dl-top {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dl-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--ov-fg-strong);
  }

  .dl-progress {
    height: 4px;
    background: var(--ov-border);
    overflow: hidden;
  }

  .dl-progress-fill {
    height: 100%;
    background: var(--ov-accent);
    width: 0;
    transition: width 0.2s linear;
  }

  .dl-progress.indeterminate .dl-progress-fill {
    width: 30%;
    animation: slide 1.2s linear infinite;
  }

  @keyframes slide {
    from { transform: translateX(-100%); }
    to { transform: translateX(350%); }
  }

  .dl-info {
    color: var(--ov-fg-muted);
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .dl-info .ok {
    color: var(--ov-accent);
  }

  .dl-info .err {
    color: #cc5555;
  }

  .btn.danger:hover {
    border-color: #cc5555;
    color: #cc5555;
    box-shadow: 0 0 6px rgba(204, 85, 85, 0.35);
  }

  /* --- History popup --- */

  #history-pop {
    position: fixed;
    right: 0;
    top: 0;
    width: 380px;
    height: 420px;
    background: var(--ov-popup-bg);
    border: 1px solid var(--ov-accent);
    border-right: none;
    border-radius: var(--ui-radius-md) 0 0 var(--ui-radius-md);
    box-shadow: 0 0 16px color-mix(in srgb, var(--ov-accent) 25%, transparent);
    display: none;
    flex-direction: column;
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  #history-pop.visible {
    display: flex;
  }

  #history-pop.open {
    opacity: 1;
    transform: translateY(0);
  }

  #history-search-row {
    padding: 10px 12px;
    border-bottom: 1px solid var(--ov-border);
  }

  #history-search {
    width: 100%;
    background: var(--ov-bg);
    color: var(--ov-fg);
    border: 1px solid var(--ov-border);
    padding: 6px 8px;
    font-size: 12px;
    outline: none;
  }

  #history-search:focus {
    border-color: var(--ov-accent);
  }

  #history-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px 12px;
  }

  #history-empty {
    color: var(--ov-fg-muted);
    font-size: 12px;
    text-align: center;
    padding: 20px 0;
  }

  .hist {
    background: var(--ov-bg);
    border: 1px solid var(--ov-border);
    padding: 6px 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }

  .hist-main {
    flex: 1;
    min-width: 0;
    display: flex;

    gap: 2px;
  }

  .hist-title {
    color: var(--ov-fg-strong);

  .hist-meta {
    color: var(--ov-fg-muted);
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .hist-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  #history-footer {
    padding: 10px 12px;
    border-top: 1px solid var(--ov-border);
  }

  #history-clear {
    width: 100%;
  }
</style>
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-title">Lymo</div>
    <div id="sidebar-scroll">
      <div id="tabs-wrapper">
        <div id="tabs"></div>
        <div id="tab-drop-indicator"></div>
      </div>
      <div id="sidebar-bookmarks">
        <div id="sidebar-bookmarks-title">Bookmarks</div>
        <div id="sidebar-bookmarks-tree"></div>
      </div>
    </div>
    <button id="new-tab-btn" title="New Tab">+ New Tab</button>
  </div>

  <div id="lymochat-panel">
    <div id="lymochat-resize-handle" title="Drag to resize"></div>
    <div id="lymochat-header">
      <span>LYMOCHAT</span>
      <button id="lymochat-close-btn" title="Close">✕</button>
    </div>
  </div>

  <div id="downloads-pop">
    <div id="downloads-title">Downloads</div>
    <div id="downloads-list">
      <div id="downloads-empty">No downloads yet</div>
    </div>
  </div>

  <div id="bookmark-picker-pop">
    <div id="bookmark-picker-title"></div>
    <div id="bookmark-picker-folders"></div>
    <div id="bookmark-picker-new-folder">
      <input type="text" id="bookmark-picker-new-folder-input" placeholder="New folder name" />
      <button class="btn" id="bookmark-picker-new-folder-btn">Create</button>
    </div>
    <div id="bookmark-picker-actions">
      <button class="btn" id="bookmark-picker-cancel-btn">Cancel</button>
      <button class="btn" id="bookmark-picker-save-btn">Save</button>
    </div>
  </div>

  <div id="autocomplete-pop"></div>

  <div id="find-bar-pop">
    <input type="text" id="find-input" placeholder="Find in page" />
    <span id="find-count"></span>
    <button class="btn" id="find-prev-btn" title="Previous match">▲</button>
    <button class="btn" id="find-next-btn" title="Next match">▼</button>
    <button class="btn" id="find-close-btn" title="Close">✕</button>
  </div>

  <div id="history-pop">
    <div id="history-search-row">
      <input id="history-search" type="text" placeholder="Search history..." />
    </div>
    <div id="history-list">
      <div id="history-empty">No history yet</div>
    </div>
    <div id="history-footer">
      <button class="btn danger" id="history-clear">Clear all history</button>
    </div>
  </div>

<script>
  const sidebar = document.getElementById('sidebar');

  // Ambient mode: tint the sidebar to match the active page's top color,
  // same source event the toolbar (renderer.js) uses.
  window.api.onChromeColor(({ bg, dark }) => {
    const root = document.documentElement.style;
    root.setProperty('--sidebar-bg', bg);
    root.setProperty('--sidebar-fg', dark ? 'var(--ov-fg)' : 'var(--ov-bg)');
  });

  const tabsEl = document.getElementById('tabs');
  const newTabBtn = document.getElementById('new-tab-btn');
  const downloadsPop = document.getElementById('downloads-pop');
  const downloadsList = document.getElementById('downloads-list');
  const historyPop = document.getElementById('history-pop');
  const historyList = document.getElementById('history-list');
  const historySearch = document.getElementById('history-search');
  const historyClear = document.getElementById('history-clear');
  const bookmarkPickerPop = document.getElementById('bookmark-picker-pop');
  const bookmarkPickerTitle = document.getElementById('bookmark-picker-title');
  const bookmarkPickerFolders = document.getElementById('bookmark-picker-folders');
  const bookmarkPickerNewFolderInput = document.getElementById('bookmark-picker-new-folder-input');
  const bookmarkPickerNewFolderBtn = document.getElementById('bookmark-picker-new-folder-btn');
  const bookmarkPickerCancelBtn = document.getElementById('bookmark-picker-cancel-btn');
  const bookmarkPickerSaveBtn = document.getElementById('bookmark-picker-save-btn');
  const sidebarBookmarksTree = document.getElementById('sidebar-bookmarks-tree');
  const findBarPop = document.getElementById('find-bar-pop');
  const findInput = document.getElementById('find-input');
  const findCount = document.getElementById('find-count');
  const findPrevBtn = document.getElementById('find-prev-btn');
  const findNextBtn = document.getElementById('find-next-btn');
  const findCloseBtn = document.getElementById('find-close-btn');

  const tabState = new Map();
  let tabOrder = []; // authoritative display order, pushed from main.js (see tab:order)
  let activeTabId = null;
  let closeTimer = null;
  let currentPanel = null; // 'sidebar' | 'downloads' | 'history' | 'lymochat' | null

  // Inline fallback icon so a missing/failed favicon never leaves a gap.
  const DEFAULT_FAVICON = 'data:image/svg+xml;utf8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="var(--ov-fg-muted)" stroke-width="1.6">' +
    '<circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.8 3 2.8 15 0 18M12 3c-2.8 3-2.8 15 0 18"/></svg>'
  );

  function orderedTabIds() {
    // tabOrder is authoritative but may briefly lag a just-created/closed tab;
    // fall back to tabState's own (insertion) order for anything it's missing.
    const known = new Set(tabOrder.filter((id) => tabState.has(id)));
    const extra = [...tabState.keys()].filter((id) => !known.has(id));
    return [...tabOrder.filter((id) => tabState.has(id)), ...extra];
  }

  // Tab rows persist as the same DOM element across renders (keyed by tab
  // id) instead of being torn down and rebuilt every time, so CSS
  // transitions on them (open/close animations, below) have something
  // continuous to animate between. Elements mid-close-animation are removed
  // from this map immediately (see closeTabElement) so renderTabs leaves
  // them alone until they finish animating out on their own.
  const tabEls = new Map(); // id -> element
  let renderedOnce = false;

  function createTabElement(id) {
    const el = document.createElement('div');
    el.dataset.id = id;
    el.draggable = true;
    el.addEventListener('click', () => window.api.switchTab(id));
    el.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      e.stopPropagation(); // don't also trigger the sidebar's own contextmenu handler
      window.api.showTabContextMenu(id);
    });
    el.addEventListener('dragstart', (e) => {
      draggedTabId = id;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      draggedTabId = null;
      hideDropIndicator();
    });
    return el;
  }

  function fillTabContent(el, id, tab) {
    const pinned = !!tab.pinned;
    el.innerHTML = '';
    el.title = pinned ? (tab.title || 'New Tab') : '';

    if (tab.incognito) {
      const mask = document.createElement('span');
      mask.className = 'tab-incognito-badge';
      mask.textContent = '🕶';
      mask.title = 'Incognito';
      el.appendChild(mask);
    }

    const favicon = document.createElement('img');
    favicon.className = 'tab-favicon';
    favicon.src = tab.favicon || DEFAULT_FAVICON;
    favicon.alt = '';
    favicon.addEventListener('error', () => {
      favicon.src = DEFAULT_FAVICON;
    }, { once: true });
    el.appendChild(favicon);

    if (!pinned) {
      const title = document.createElement('span');
      title.className = 'tab-title';
      title.textContent = tab.title || 'New Tab';
      el.appendChild(title);

      if (tab.audible || tab.muted) {
        const audio = document.createElement('button');
        audio.className = 'tab-audio-btn';
        audio.textContent = tab.muted ? '🔇' : '🔊';
        audio.title = tab.muted ? 'Unmute tab' : 'Mute tab';
        audio.addEventListener('click', (e) => {
          e.stopPropagation();
          window.api.toggleTabMute(id);
        });
        el.appendChild(audio);
      }

      // Pinned tabs have no close button at all, so they can't be closed
      // by an accidental click -- unpin from the right-click menu first.
      const close = document.createElement('span');
      close.className = 'tab-close';
      close.textContent = '✕';
      close.addEventListener('click', (e) => {
        e.stopPropagation();
        window.api.closeTab(id);
      });
      el.appendChild(close);
    }
  }

  function applyTabClasses(el, id, tab) {
    const base = 'tab' +
      (id === activeTabId ? ' active' : '') +
      (tab.pinned ? ' pinned' : '') +
      (tab.incognito ? ' incognito' : '');
    // Animation/drag classes are driven by their own logic elsewhere;
    // preserve whichever of them happen to be on the element right now
    // instead of clobbering them on every re-render.
    const transient = ['tab-enter', 'tab-enter-active', 'dragging']
      .filter((c) => el.classList.contains(c));
    el.className = [base, ...transient].join(' ');
  }

  function playEnterAnimation(el) {
    el.classList.add('tab-enter');
    // Two rAFs: the first lets the browser paint the 'tab-enter' (from)
    // state, the second flips to 'tab-enter-active' so the transition
    // actually has a starting point to animate from.
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        el.classList.remove('tab-enter');
        el.classList.add('tab-enter-active');
      });
    });
    const done = () => el.classList.remove('tab-enter-active');
    el.addEventListener('transitionend', done, { once: true });
    setTimeout(done, 300); // fallback in case transitionend never fires
  }

  function renderTabs() {
    const ids = orderedTabIds();
    const seen = new Set();
    let prevEl = null;
    for (const id of ids) {
      seen.add(id);
      const tab = tabState.get(id);
      let el = tabEls.get(id);
      const isNew = !el;
      if (isNew) {
        el = createTabElement(id);
        tabEls.set(id, el);
      }
      fillTabContent(el, id, tab);
      applyTabClasses(el, id, tab);

      const desiredNext = prevEl ? prevEl.nextSibling : tabsEl.firstChild;
      if (desiredNext !== el) tabsEl.insertBefore(el, desiredNext);
      prevEl = el;

      if (isNew) {
        if (renderedOnce) playEnterAnimation(el);
        else el.classList.add('tab-enter-active'); // no animation on first paint
      }
    }
    for (const [id, el] of tabEls) {
      if (!seen.has(id)) {
        el.remove();
        tabEls.delete(id);
      }
    }
    renderedOnce = true;
  }

  // Animates a closing tab row shrinking to nothing (fading + sliding left)
  // instead of yanking it out of the DOM instantly; the flex column layout
  // means every row below it rides the same height transition and slides
  // up smoothly to fill the gap, no manual repositioning needed.
  function closeTabElement(id) {
    const el = tabEls.get(id);
    tabEls.delete(id); // stop renderTabs from managing it -- it finishes its own exit below
    if (!el) return;
    el.classList.remove('tab-enter', 'tab-enter-active');
    el.classList.add('tab-exit');
    void el.offsetHeight; // force layout so the browser registers the pre-collapse state first
    requestAnimationFrame(() => el.classList.add('tab-exit-active'));
    const done = () => el.remove();
    el.addEventListener('transitionend', done, { once: true });
    setTimeout(done, 260); // fallback in case transitionend never fires
  }

  // --- Drag-and-drop tab reordering ---

  let draggedTabId = null;
  const dropIndicator = document.getElementById('tab-drop-indicator');

  function hideDropIndicator() {
    dropIndicator.classList.remove('visible');
  }

  tabsEl.addEventListener('dragover', (e) => {
    if (draggedTabId === null) return;
    e.preventDefault();
    const row = e.target.closest('.tab');
    if (!row) {
      hideDropIndicator();
      return;
    }
    const rect = row.getBoundingClientRect();
    const before = e.clientY < rect.top + rect.height / 2;
    const y = (before ? row.offsetTop : row.offsetTop + row.offsetHeight) - tabsEl.offsetTop;
    dropIndicator.style.top = y + 'px';
    dropIndicator.classList.add('visible');
    row.dataset.dropBefore = before ? '1' : '0';
  });

  tabsEl.addEventListener('dragleave', (e) => {
    if (!tabsEl.contains(e.relatedTarget)) hideDropIndicator();
  });

  tabsEl.addEventListener('drop', (e) => {
    e.preventDefault();
    hideDropIndicator();
    if (draggedTabId === null) return;
    const row = e.target.closest('.tab');
    const ids = orderedTabIds();
    const fromIndex = ids.indexOf(draggedTabId);
    if (fromIndex === -1) return;
    ids.splice(fromIndex, 1);
    if (row) {
      const targetId = Number(row.dataset.id);
      let toIndex = ids.indexOf(targetId);
      if (row.dataset.dropBefore !== '1') toIndex += 1;
      ids.splice(toIndex, 0, draggedTabId);
    } else {
      ids.push(draggedTabId); // dropped past the last tab
    }
    window.api.reorderTabs(ids);
  });

  window.api.onTabCreated(({ id, url, pinned, incognito }) => {
    tabState.set(id, { url, title: 'New Tab', pinned: !!pinned, incognito: !!incognito });
    renderTabs();
  });

  window.api.onTabUpdate((data) => {
    tabState.set(data.id, data);
    renderTabs();
  });

  window.api.onTabOrder((order) => {
    tabOrder = order;
    renderTabs();
  });

  window.api.onTabClosed(({ id }) => {
    tabState.delete(id);
    tabOrder = tabOrder.filter((x) => x !== id);
    closeTabElement(id);
  });

  window.api.onTabActive(({ id }) => {
    activeTabId = id;
    renderTabs();
  });

  newTabBtn.addEventListener('click', () => window.api.createTab());

  // Right-click on empty sidebar space (not a tab row, which has its own
  // contextmenu handler that stops this from also firing) for New Incognito Tab.
  sidebar.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    window.api.showSidebarContextMenu();
  });

  function applyTheme(dark) {
    document.documentElement.classList.toggle('light-theme', !dark);
  }
  window.api.getTheme().then(applyTheme);
  window.api.onThemeChanged(applyTheme);

  function applyAccent(color) {
    document.documentElement.style.setProperty('--ov-accent', color);
  }
  window.api.getAccentColor().then(applyAccent);
  window.api.onAccentColorChanged(applyAccent);

  function applyStyle(style) {
    document.documentElement.dataset.style = String(style);
  }
  window.api.getStyle().then(applyStyle);
  window.api.onStyleChanged(applyStyle);

  // --- Bookmarks (sidebar folder tree + the folder-picker popup opened from
  // the toolbar star button) ---

  let bookmarksState = { folders: [], bookmarks: [] };
  let pendingBookmarkTarget = null; // { url, title } while the picker is open
  let pickerSelectedFolderId = null;
  const collapsedFolders = new Set(); // folder ids collapsed in the sidebar tree

  const bmFaviconUrl = (url) => {
    try {
      return `https://www.google.com/s2/favicons?sz=32&domain=${new URL(url).hostname}`;
    } catch {
      return '';
    }
  };

  function renderSidebarBookmarks() {
    sidebarBookmarksTree.innerHTML = '';
    if (bookmarksState.bookmarks.length === 0) {
      const empty = document.createElement('div');
      empty.id = 'sidebar-bookmarks-empty';
      empty.textContent = 'No bookmarks yet';
      sidebarBookmarksTree.appendChild(empty);
      return;
    }
    for (const folder of bookmarksState.folders) {
      const items = bookmarksState.bookmarks.filter((b) => b.folderId === folder.id);
      if (items.length === 0) continue;

      const folderEl = document.createElement('div');
      folderEl.className = 'bm-folder' + (collapsedFolders.has(folder.id) ? ' collapsed' : '');

      const header = document.createElement('div');
      header.className = 'bm-folder-header';
      header.innerHTML = '<span class="bm-folder-caret">▾</span><span class="bm-folder-name"></span>';
      header.querySelector('.bm-folder-name').textContent = folder.name;
      header.addEventListener('click', () => {
        if (collapsedFolders.has(folder.id)) collapsedFolders.delete(folder.id);
        else collapsedFolders.add(folder.id);
        renderSidebarBookmarks();
      });

      const itemsEl = document.createElement('div');
      itemsEl.className = 'bm-folder-items';
      for (const b of items) {
        const row = document.createElement('div');
        row.className = 'bm-item';
        row.title = b.url;
        const favicon = document.createElement('img');
        favicon.className = 'bm-item-favicon';
        favicon.src = bmFaviconUrl(b.url);
        favicon.alt = '';
        const name = document.createElement('span');
        name.className = 'bm-item-name';
        name.textContent = b.name;
        row.appendChild(favicon);
        row.appendChild(name);
        row.addEventListener('click', () => {
          if (activeTabId !== null) window.api.go(activeTabId, b.url);
        });
        itemsEl.appendChild(row);
      }

      folderEl.appendChild(header);
      folderEl.appendChild(itemsEl);
      sidebarBookmarksTree.appendChild(folderEl);
    }
  }

  function renderBookmarkPickerFolders() {
    bookmarkPickerFolders.innerHTML = '';
    for (const folder of bookmarksState.folders) {
      const row = document.createElement('div');
      row.className = 'bm-picker-folder' + (folder.id === pickerSelectedFolderId ? ' selected' : '');
      row.textContent = folder.name;
      row.addEventListener('click', () => {
        pickerSelectedFolderId = folder.id;
        renderBookmarkPickerFolders();
      });
      bookmarkPickerFolders.appendChild(row);
    }
  }

  window.api.getBookmarks().then((data) => {
    bookmarksState = data;
    renderSidebarBookmarks();
  });

  window.api.onBookmarksChanged((data) => {
    bookmarksState = data;
    renderSidebarBookmarks();
    if (currentPanel === 'bookmark-picker') renderBookmarkPickerFolders();
  });

  bookmarkPickerNewFolderBtn.addEventListener('click', () => {
    const name = bookmarkPickerNewFolderInput.value.trim();
    if (!name) return;
    window.api.addBookmarkFolder(name).then((data) => {
      bookmarksState = { folders: data.folders, bookmarks: data.bookmarks };
      if (data.folder) pickerSelectedFolderId = data.folder.id;
      bookmarkPickerNewFolderInput.value = '';
      renderBookmarkPickerFolders();
    });
  });

  bookmarkPickerNewFolderInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') bookmarkPickerNewFolderBtn.click();
  });

  // Buttons live inside the popup, so the mouse stays "inside" it after the
  // click -- the generic hover-based auto-close (below) would just cancel
  // any close we scheduled. Force-close immediately instead, mirroring how
  // history's "open" action closes the overlay from the main process.
  function forceClosePanel() {
    cancelClose();
    if (currentPanel) {
      panelEl(currentPanel).classList.remove('open', 'visible');
      currentPanel = null;
    }
    window.api.hideOverlay();
  }

  bookmarkPickerCancelBtn.addEventListener('click', () => {
    pendingBookmarkTarget = null;
    forceClosePanel();
  });

  bookmarkPickerSaveBtn.addEventListener('click', () => {
    if (!pendingBookmarkTarget || pickerSelectedFolderId === null) return;
    window.api.addBookmark(pendingBookmarkTarget.title, pendingBookmarkTarget.url, pickerSelectedFolderId);
    pendingBookmarkTarget = null;
    forceClosePanel();
  });

  // --- Find in page (Ctrl+F) ---

  findInput.addEventListener('input', () => {
    window.api.findQuery(findInput.value, true, false);
  });

  findInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      e.preventDefault();
      window.api.closeFind();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      window.api.findQuery(findInput.value, !e.shiftKey, true);
    }
  });

  findPrevBtn.addEventListener('click', () => window.api.findQuery(findInput.value, false, true));
  findNextBtn.addEventListener('click', () => window.api.findQuery(findInput.value, true, true));
  findCloseBtn.addEventListener('click', () => window.api.closeFind());

  window.api.onFindResult(({ matches, activeMatchOrdinal }) => {
    findCount.textContent = matches > 0 ? `${activeMatchOrdinal}/${matches}` : (findInput.value ? '0/0' : '');
  });

  // --- Address bar autocomplete dropdown ---

  const autocompletePop = document.getElementById('autocomplete-pop');

  function renderAutocomplete(results) {
    autocompletePop.innerHTML = '';
    results.forEach((r, i) => {
      const row = document.createElement('div');
      row.className = 'ac-item';
      row.dataset.index = i;

      const favicon = document.createElement('img');
      favicon.className = 'ac-favicon';
      favicon.src = bmFaviconUrl(r.url);
      favicon.alt = '';

      const text = document.createElement('div');
      text.className = 'ac-text';
      const title = document.createElement('div');
      title.className = 'ac-title';
      title.textContent = r.title || r.url;
      const url = document.createElement('div');
      url.className = 'ac-url';
      url.textContent = r.url;
      text.appendChild(title);
      text.appendChild(url);

      row.appendChild(favicon);
      row.appendChild(text);
      row.addEventListener('click', () => {
        if (activeTabId !== null) window.api.go(activeTabId, r.url);
        window.api.hideAutocomplete();
      });
      autocompletePop.appendChild(row);
    });
  }

  window.api.onAutocompleteData((results) => renderAutocomplete(results));

  window.api.onAutocompleteHighlight((index) => {
    autocompletePop.querySelectorAll('.ac-item').forEach((el) => {
      el.classList.toggle('highlighted', Number(el.dataset.index) === index);
    });
    const highlighted = autocompletePop.querySelector(`.ac-item[data-index="${index}"]`);
    if (highlighted) highlighted.scrollIntoView({ block: 'nearest' });
  });

  // --- Downloads popup ---

  const dlState = new Map(); // id -> latest download:update payload

  function formatBytes(n) {
    if (!n || n <= 0) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.min(Math.floor(Math.log(n) / Math.log(1024)), units.length - 1);
    const v = n / Math.pow(1024, i);
    return (v >= 100 || i === 0 ? Math.round(v) : v.toFixed(1)) + ' ' + units[i];
  }

  function formatTime(sec) {
    if (sec == null || !isFinite(sec)) return '';
    sec = Math.round(sec);
    if (sec < 60) return sec + ' s';
    if (sec < 3600) return Math.floor(sec / 60) + ' m ' + (sec % 60) + ' s';
    return Math.floor(sec / 3600) + ' h ' + Math.floor((sec % 3600) / 60) + ' m';
  }

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
  }

  function dlInfoText(d) {
    if (d.state === 'completed') return '<span class="ok">Completed</span> • ' + formatBytes(d.total || d.received);
    if (d.state === 'cancelled') return '<span class="err">Cancelled</span>';
    if (d.state === 'interrupted') return '<span class="err">Interrupted</span>';
    const parts = [];
    if (d.total > 0) {
      parts.push(Math.floor((d.received / d.total) * 100) + '%');
      parts.push(formatBytes(d.received) + ' / ' + formatBytes(d.total));
    } else {
      parts.push(formatBytes(d.received));
    }
    if (d.paused) {
      parts.push('Paused');
    } else if (d.speed > 0) {
      parts.push(formatBytes(d.speed) + '/s');
      const eta = formatTime(d.etaSec);
      if (eta) parts.push(eta + ' left');
    }
    return parts.join(' • ');
  }

  function dlButtonsHtml(d) {
    if (d.state === 'completed') {
      return '<button class="btn" data-act="open-file">Open File</button>' +
             '<button class="btn" data-act="open-folder">Open Folder</button>';
    }
    if (d.state === 'progressing') {
      const pauseBtn = d.paused
        ? '<button class="btn" data-act="resume" title="Resume">▶</button>'
        : '<button class="btn" data-act="pause" title="Pause">⏸</button>';
      return pauseBtn + '<button class="btn" data-act="cancel" title="Cancel">✕</button>';
    }
    return '';
  }

  function renderDownload(d) {
    const empty = document.getElementById('downloads-empty');
    if (empty) empty.remove();
    let el = document.getElementById('dl-' + d.id);
    if (!el) {
      el = document.createElement('div');
      el.id = 'dl-' + d.id;
      el.className = 'dl';
      el.dataset.id = d.id;
      downloadsList.prepend(el);
    }
    el.classList.toggle('done', d.state === 'completed');
    const pct = d.total > 0 ? Math.min((d.received / d.total) * 100, 100) : 0;
    const indeterminate = d.state === 'progressing' && !d.paused && d.total <= 0;
    const fillPct = d.state === 'completed' ? 100 : pct;
    el.innerHTML =
      '<div class="dl-top">' +
        '<span class="dl-name" title="' + esc(d.filename) + '">' + esc(d.filename) + '</span>' +
        dlButtonsHtml(d) +
      '</div>' +
      '<div class="dl-progress' + (indeterminate ? ' indeterminate' : '') + '">' +
        '<div class="dl-progress-fill" style="width:' + fillPct + '%"></div>' +
      '</div>' +
      '<div class="dl-info">' + dlInfoText(d) + '</div>';
  }

  window.api.onDownloadUpdate((d) => {
    dlState.set(d.id, d);
    renderDownload(d);
  });

  downloadsList.addEventListener('click', (e) => {
    const btn = e.target.closest('.btn');
    if (!btn || !btn.dataset.act) return;
    const id = Number(btn.closest('.dl').dataset.id);
    switch (btn.dataset.act) {
      case 'pause': window.api.pauseDownload(id); break;
      case 'resume': window.api.resumeDownload(id); break;
      case 'cancel': window.api.cancelDownload(id); break;
      case 'open-file': window.api.openDownloadFile(id); break;
      case 'open-folder': window.api.openDownloadFolder(id); break;
    }
  });

  // --- History popup ---

  let histState = []; // newest first, full list

  function formatHistTime(ms) {
    return new Date(ms).toLocaleString('en-US', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function renderHistoryList() {
    const q = historySearch.value.trim().toLowerCase();
    const filtered = q
      ? histState.filter((h) =>
          (h.title || '').toLowerCase().includes(q) || (h.url || '').toLowerCase().includes(q))
      : histState;

    historyList.innerHTML = '';
    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.id = 'history-empty';
      empty.textContent = q ? 'No results found' : 'No history yet';
      historyList.appendChild(empty);
      return;
    }
    for (const h of filtered) {
      const el = document.createElement('div');
      el.className = 'hist';
      el.dataset.id = h.id;
      el.innerHTML =
        '<div class="hist-main">' +
          '<span class="hist-title" title="' + esc(h.title) + '">' + esc(h.title) + '</span>' +
          '<span class="hist-meta" title="' + esc(h.url) + '">' + formatHistTime(h.time) + ' • ' + esc(h.url) + '</span>' +
        '</div>' +
        '<div class="hist-actions">' +
          '<button class="btn" data-act="open" title="Go">▶</button>' +
          '<button class="btn" data-act="delete" title="Delete">✕</button>' +
        '</div>';
      historyList.appendChild(el);
    }
  }

  historySearch.addEventListener('input', renderHistoryList);

  window.api.onHistoryAdded((entry) => {
    histState.unshift(entry);
    renderHistoryList();
  });

  window.api.onHistoryUpdated((entry) => {
    const idx = histState.findIndex((h) => h.id === entry.id);
    if (idx !== -1) {
      histState[idx] = entry;
      renderHistoryList();
    }
  });

  historyList.addEventListener('click', (e) => {
    const btn = e.target.closest('.btn');
    if (!btn || !btn.dataset.act) return;
    const id = Number(btn.closest('.hist').dataset.id);
    const entry = histState.find((h) => h.id === id);
    if (btn.dataset.act === 'open' && entry) {
      window.api.openHistoryUrl(entry.url);
    } else if (btn.dataset.act === 'delete') {
      window.api.deleteHistoryEntry(id);
      histState = histState.filter((h) => h.id !== id);
      renderHistoryList();
    }
  });

  historyClear.addEventListener('click', () => {
    window.api.clearHistory();
    histState = [];
    renderHistoryList();
  });

  const lymochatPanel = document.getElementById('lymochat-panel');
  document.getElementById('lymochat-close-btn').addEventListener('click', () => {
    window.api.hideLymoChat();
  });

  function panelEl(mode) {
    if (mode === 'downloads') return downloadsPop;
    if (mode === 'history') return historyPop;
    if (mode === 'lymochat') return lymochatPanel;
    if (mode === 'bookmark-picker') return bookmarkPickerPop;
    if (mode === 'find') return findBarPop;
    if (mode === 'autocomplete') return autocompletePop;
    return sidebar;
  }

  function openPanel(mode) {
    cancelClose();
    if (currentPanel && currentPanel !== mode) {
      panelEl(currentPanel).classList.remove('open', 'visible');
    }
    currentPanel = mode;
    const el = panelEl(mode);
    el.classList.add('visible');
    // wait a frame so the display:none -> flex transition actually triggers
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('open')));
  }

  function startClose() {
    // Unlike the other popups, the find bar shouldn't close just because the
    // mouse moved onto the page -- users need to interact with the page
    // (scroll, click matches) while it stays open. It only closes via the
    // close button, Escape, or toggling Ctrl+F off.
    if (currentPanel === 'lymochat' || currentPanel === 'find' || currentPanel === 'autocomplete') return;
    cancelClose();
    closeTimer = setTimeout(() => {
      if (!currentPanel) return;
      const el = panelEl(currentPanel);
      el.classList.remove('open');
      const finish = () => {
        if (el.classList.contains('open')) return; // reopened in the meantime
        if (!currentPanel) return; // already closed
        el.classList.remove('visible');
        currentPanel = null;
        window.api.hideOverlay();
      };
      el.addEventListener('transitionend', finish, { once: true });
      // safety net in case transitionend is missed (e.g. visibility change)
      setTimeout(finish, 400);
    }, 500);
  }

  function cancelClose() {
    if (closeTimer) {
      clearTimeout(closeTimer);
      closeTimer = null;
    }
  }

  const lymochatResizeHandle = document.getElementById('lymochat-resize-handle');
  let lymochatResizing = false;
  const LYMOCHAT_MIN_WIDTH = 280;
  const LYMOCHAT_MAX_WIDTH_RATIO = 0.7;

  function clampLymoChatWidth(requested) {
    const maxWidth = Math.round(window.innerWidth * LYMOCHAT_MAX_WIDTH_RATIO);
    return Math.min(maxWidth, Math.max(LYMOCHAT_MIN_WIDTH, Math.round(requested)));
  }

  function endLymoChatDrag() {
    if (!lymochatResizing) return;
    lymochatResizing = false;
    lymochatPanel.classList.remove('resizing');
    window.api.lymochatResizeEnd();
  }

  lymochatResizeHandle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    lymochatResizing = true;
    lymochatPanel.classList.add('resizing');
    window.api.lymochatResizeStart();
  });

  document.addEventListener('mousemove', (e) => {
    if (!lymochatResizing) return;
    const newWidth = clampLymoChatWidth(window.innerWidth - e.clientX);
    lymochatPanel.style.width = newWidth + 'px';
    window.api.lymochatResizeMove(newWidth);
  });

  document.addEventListener('mouseup', endLymoChatDrag);
  // Safety net: if the button is released outside the window we never see
  // a mouseup here, so end the drag when focus leaves the app instead.
  window.addEventListener('blur', endLymoChatDrag);

  window.api.onOverlayOpen(({ mode, width, url, title, results }) => {
    openPanel(mode);
    if (mode === 'lymochat' && width) {
      lymochatPanel.style.width = width + 'px';
    }
    if (mode === 'history') {
      historySearch.value = '';
      window.api.getHistory().then((entries) => {
        histState = entries;
        renderHistoryList();
      });
    }
    if (mode === 'bookmark-picker') {
      pendingBookmarkTarget = { url, title };
      bookmarkPickerTitle.textContent = title || url;
      bookmarkPickerNewFolderInput.value = '';
      window.api.getBookmarks().then((data) => {
        bookmarksState = data;
        pickerSelectedFolderId = bookmarksState.folders.length > 0 ? bookmarksState.folders[0].id : null;
        renderBookmarkPickerFolders();
      });
    }
    if (mode === 'find') {
      findInput.value = '';
      findCount.textContent = '';
      findInput.focus();
    }
    if (mode === 'autocomplete') {
      renderAutocomplete(results || []);
    }
  });

  // Start the close timer once the cursor leaves the panel (into the
  // overlay's transparent area) or the overlay area entirely.
  document.addEventListener('mousemove', (e) => {
    if (!currentPanel) return;
    const el = panelEl(currentPanel);
    const r = el.getBoundingClientRect();
    const inside = e.clientX >= r.left && e.clientX <= r.right &&
                   e.clientY >= r.top && e.clientY <= r.bottom;
    if (inside) {
      cancelClose();
    } else if (!closeTimer) {
      startClose();
    }
  });

  document.addEventListener('mouseleave', () => {
    if (currentPanel) startClose();
  });
</script>
</body>
</html>
