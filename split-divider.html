<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Split Divider</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: transparent;
    overflow: hidden;
    cursor: ew-resize;
    user-select: none;
  }

  #line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    left: 3px; /* centered in the 8px idle strip */
    background: rgba(128, 128, 128, 0.5);
  }

  #line.active {
    background: #32CD32;
    box-shadow: 0 0 4px #32CD32;
  }
</style>
</head>
<body>
  <div id="line"></div>
  <script>
    const line = document.getElementById('line');
    let dragging = false;

    document.addEventListener('mousedown', () => {
      dragging = true;
      line.classList.add('active');
      window.splitDivider.dragStart();
    });

    // While idle this document is only the thin 8px strip, so clientX here is
    // meaningless for a window-wide ratio; only meaningful once main.js has
    // widened us to the full content width (see onContext below).
    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const ratio = e.clientX / window.innerWidth;
      line.style.left = e.clientX + 'px';
      window.splitDivider.dragMove(ratio);
    });

    function endDrag() {
      if (!dragging) return;
      dragging = false;
      line.classList.remove('active');
      line.style.left = '3px';
      window.splitDivider.dragEnd();
    }

    document.addEventListener('mouseup', endDrag);
    // Safety net if the button is released while focus has left the app.
    window.addEventListener('blur', endDrag);

    window.splitDivider.onContext(({ dividerX }) => {
      line.style.left = dividerX + 'px';
    });
  </script>
</body>
</html>
